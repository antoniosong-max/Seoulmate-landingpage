<!DOCTYPE html>
<html class="scroll-smooth" lang="de">
<head>
<meta charset="utf-8" />
<meta content="width=device-width, initial-scale=1.0" name="viewport" />
<title>SEOULMATE — Dein K-Convini im Wandsbek Quarree</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Anton&display=swap" rel="stylesheet" />
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet" />
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "gochujang": "#780000",
          "gochujang-dark": "#5c0000",
          "crimson": "#c1121f",
          "varden": "#fdf0d5",
          "cosmos": "#003049",
          "marble": "#669bbc",
          ink: "#1a1410",
          paper: "#fdf0d5",
        },
        fontFamily: {
          display: ["Anton", "Inter", "sans-serif"],
          body: ["Inter", "sans-serif"],
        },
      },
    },
  };
</script>
<style>
  body { font-family: 'Inter', sans-serif; background-color: #fdf0d5; color: #1a1410; }
  .font-display { font-family: 'Anton', 'Inter', sans-serif; font-style: italic; letter-spacing: 0.01em; }
  .neon-glow { text-shadow: 0 0 12px rgba(193, 18, 31, 0.9), 0 0 26px rgba(120, 0, 0, 0.5); }
  .live-dot {
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
</style>
</head>
<body class="bg-paper">

<!-- TopNavBar -->
<nav class="fixed top-0 w-full z-50 bg-paper/90 backdrop-blur-md border-b border-gochujang/15">
  <div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
    <a href="#top" class="flex items-center gap-3">
      <img src="/attachments/A6DC20C6-33E2-4D86-8880-596ADBF373A1.jpg" 
           alt="SEOULMATE Neon Sign" 
           class="h-11 w-auto drop-shadow-xl neon-glow" />
    </a>

    <div class="flex items-center gap-8 text-sm font-medium">
      <a href="#produkte" class="hover:text-crimson transition-colors">Produkte</a>
      <a href="#ueber-uns" class="hover:text-crimson transition-colors">Über uns</a>
      <a href="#location" class="hover:text-crimson transition-colors">Standort</a>
      <a href="#newsletter" class="hover:text-crimson transition-colors">Newsletter</a>
    </div>

    <div class="flex items-center gap-3">
      <div class="flex items-center gap-2 bg-white/80 px-4 py-1.5 rounded-full text-sm border border-crimson/20">
        <span class="w-2 h-2 bg-green-500 rounded-full live-dot"></span>
        <span class="font-medium text-ink">Live im Wandsbek Quarree</span>
      </div>
    </div>
  </div>
</nav>

<!-- Hero mit Eyecatcher -->
<section class="pt-28 pb-20 px-6 relative" id="top">
  <div class="max-w-5xl mx-auto text-center">
    <div class="relative mx-auto mb-10 max-w-lg">
      <img src="/attachments/A6DC20C6-33E2-4D86-8880-596ADBF373A1.jpg" 
           alt="SEOULMATE" 
           class="w-full rounded-3xl shadow-2xl neon-glow" />
    </div>
    <h1 class="font-display text-7xl md:text-8xl text-ink tracking-tighter">SEOULMATE</h1>
    <p class="text-2xl text-ink/80 mt-3">Dein K-Convini im Wandsbek Quarree</p>
  </div>
</section>

<!-- Rest der Seite (Footer etc.) bleibt wie bisher -->
<footer class="bg-ink text-white py-12">
  <div class="max-w-7xl mx-auto px-6 text-center">
    <p class="text-sm text-white/50">© 2024 SEOULMATE Asia Market. Alle Rechte vorbehalten.</p>
  </div>
</footer>

<script>
  // Smooth Scroll
  document.querySelectorAll('a[href^="#"]').forEach(anchor => {
    anchor.addEventListener('click', function (e) {
      const target = document.querySelector(this.getAttribute('href'));
      if (target) {
        e.preventDefault();
        window.scrollTo({
          top: target.offsetTop - 80,
          behavior: 'smooth'
        });
      }
    });
  });
</script>
</body>
</html>
